name: 'Airut Sandbox'
description: >-
  Run CI commands inside a sandboxed container with network restrictions
  and credential isolation. Loads sandbox configuration from the trusted
  base branch; PR code runs only inside the container.

inputs:
  command:
    description: 'CI command to run inside the sandbox (after PR checkout)'
    required: true
  pr_sha:
    description: 'PR commit SHA to check out and test'
    required: true
  merge:
    description: >-
      Merge PR into base branch before running (like GitHub default).
      Set to "false" to check out the PR commit directly.
    required: false
    default: 'true'
  airut_version:
    description: >-
      Airut version to install. PyPI version (e.g., "0.15.0") or "main"
      for latest from GitHub. Empty = use version bundled with action.
    required: false
    default: ''
  sandbox_args:
    description: 'Additional arguments for airut-sandbox run'
    required: false
    default: '--verbose'
  cache:
    description: >-
      Enable image caching across CI runs. Set to "false" to disable
      caching and force fresh image builds every run.
    required: false
    default: 'true'
  cache-version:
    description: >-
      Arbitrary string appended to cache keys to force invalidation.
      Change this value when automatic cache invalidation is insufficient
      (e.g., to pick up new versions of dynamically-installed tools).
    required: false
    default: ''
  cache-max-age:
    description: >-
      Maximum image age in hours before forced rebuild. Passed as
      --max-image-age to airut-sandbox run. Default 168 (one week).
    required: false
    default: '168'

runs:
  using: "composite"
  steps:
    # --- Host-side setup (trusted) ---

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install Python
      shell: bash
      run: uv python install 3.13

    - name: Install airut-sandbox
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.airut_version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        VERSION="$INPUT_VERSION"
        if [ -z "$VERSION" ]; then
          VERSION=$(cat "$ACTION_PATH/VERSION")
        fi
        if [ "$VERSION" = "main" ]; then
          uv tool install \
            "airut @ git+https://github.com/airutorg/airut@main"
        else
          uv tool install "airut==$VERSION"
        fi

    # --- Base-branch checkout (trusted config) ---
    # Uses base.ref for PRs, ref_name for push events.
    # Security: the workflow MUST trigger only on PRs targeting protected
    # branches. See README for required security controls.

    - name: Checkout trusted base branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
        fetch-depth: 0

    # --- Fetch PR SHA on host ---
    # Objects are stored in .git/ which is mounted into the container.
    # This avoids needing GitHub credentials inside the sandbox.

    - name: Fetch PR commit
      shell: bash
      env:
        TARGET_SHA: ${{ inputs.pr_sha }}
      run: git fetch origin "$TARGET_SHA"

    # --- Image caching (pre-sandbox, all steps on trusted host) ---
    # Cache operations run BEFORE the sandbox so the workspace is still
    # untainted. Uses split restore/save pattern to only upload on miss.

    - name: Compute image hashes
      id: image-hash
      if: inputs.cache == 'true'
      shell: bash
      run: |
        eval "$(airut-sandbox image hash --verbose)"
        echo "repo=$repo" >> "$GITHUB_OUTPUT"
        echo "proxy=$proxy" >> "$GITHUB_OUTPUT"

    - name: Fetch Claude Code version
      id: cc-version
      if: inputs.cache == 'true'
      shell: bash
      run: |
        CC_VERSION=$(curl -fsSL --max-time 5 \
          "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/latest" \
          2>/dev/null || echo "unknown")
        echo "version=$CC_VERSION" >> "$GITHUB_OUTPUT"

    - name: Restore repo image cache
      id: repo-cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v4
      with:
        path: /tmp/airut-image-cache/repo.tar
        key: >-
          airut-repo-${{ steps.image-hash.outputs.repo }}-cc${{ steps.cc-version.outputs.version }}${{ inputs.cache-version && format('-v{0}', inputs.cache-version) || '' }}

    - name: Restore proxy image cache
      id: proxy-cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v4
      with:
        path: /tmp/airut-image-cache/proxy.tar
        key: >-
          airut-proxy-${{ steps.image-hash.outputs.proxy }}${{ inputs.cache-version && format('-v{0}', inputs.cache-version) || '' }}

    - name: Load cached images
      if: >-
        inputs.cache == 'true' &&
        (steps.repo-cache.outputs.cache-hit == 'true' ||
         steps.proxy-cache.outputs.cache-hit == 'true')
      shell: bash
      run: airut-sandbox image load /tmp/airut-image-cache --verbose

    - name: Build and save images
      if: >-
        inputs.cache == 'true' &&
        (steps.repo-cache.outputs.cache-hit != 'true' ||
         steps.proxy-cache.outputs.cache-hit != 'true')
      shell: bash
      run: airut-sandbox image save /tmp/airut-image-cache --verbose

    - name: Upload repo image cache
      if: >-
        inputs.cache == 'true' &&
        steps.repo-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/airut-image-cache/repo.tar
        key: >-
          airut-repo-${{ steps.image-hash.outputs.repo }}-cc${{ steps.cc-version.outputs.version }}${{ inputs.cache-version && format('-v{0}', inputs.cache-version) || '' }}

    - name: Upload proxy image cache
      if: >-
        inputs.cache == 'true' &&
        steps.proxy-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/airut-image-cache/proxy.tar
        key: >-
          airut-proxy-${{ steps.image-hash.outputs.proxy }}${{ inputs.cache-version && format('-v{0}', inputs.cache-version) || '' }}

    # --- Run sandboxed command ---
    # The checkout/merge + command is passed inline. No files are written
    # to the workspace -- it must remain clean for worktree-clean checks.
    #
    # SECURITY: This must be the LAST step. After sandbox execution the
    # workspace is tainted (untrusted code had write access to .git/ and
    # all files). No host-side steps may run after this point.

    - name: Run sandboxed command
      shell: bash
      env:
        SANDBOX_PR_SHA: ${{ inputs.pr_sha }}
        SANDBOX_COMMAND: ${{ inputs.command }}
        SANDBOX_ARGS: ${{ inputs.sandbox_args }}
        SANDBOX_MERGE: ${{ inputs.merge }}
        SANDBOX_MAX_IMAGE_AGE: ${{ inputs.cache-max-age }}
        SANDBOX_CACHE: ${{ inputs.cache }}
      run: |
        if [ "$SANDBOX_MERGE" = "true" ]; then
          GIT_CMD='git merge --no-edit "$1"'
        else
          GIT_CMD='git checkout "$1"'
        fi
        EXTRA_ARGS=""
        if [ "$SANDBOX_CACHE" = "true" ]; then
          EXTRA_ARGS="--max-image-age $SANDBOX_MAX_IMAGE_AGE"
        fi
        # shellcheck disable=SC2086
        airut-sandbox run $SANDBOX_ARGS $EXTRA_ARGS -- \
          bash -c "$GIT_CMD"' && eval "$2"' \
          _ "$SANDBOX_PR_SHA" "$SANDBOX_COMMAND"
