name: Test

on:
  push:
    branches: [main, v*]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: ./
        with:
          command: >-
            python3 -c "import sys; print(f'Python {sys.version}'); print('sandbox-action self-test passed')"
          pr_sha: ${{ github.sha }}
          merge: false
