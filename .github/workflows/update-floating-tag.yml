name: Update floating tag

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update from (e.g., v0.18.0)"
        required: true

jobs:
  update-tag:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (!github.event.release.prerelease
          && startsWith(github.event.release.tag_name, 'v'))
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update major version tag
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          # Extract major version: v0.18.0 -> v0
          MAJOR="v$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)"
          # fetch-tags option is broken (actions/checkout#1471), fetch explicitly
          git fetch origin tag "$TAG" --force
          git tag -f "$MAJOR" "$TAG"
          git push origin "refs/tags/$MAJOR" --force
