name: Update floating tag

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update from (e.g., v0.18.0)"
        required: true

permissions:
  contents: write

jobs:
  update-tag:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (!github.event.release.prerelease
          && startsWith(github.event.release.tag_name, 'v'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Update major version tag
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          # Extract major version: v0.18.0 -> v0
          MAJOR="v$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)"
          git tag -f "$MAJOR" "$TAG"
          git push origin "refs/tags/$MAJOR" --force
